name: Update Earnings Calendar

on:
  schedule:
    - cron: "17 1,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Generate calendar
        run: python3 generate_calendar.py

      - name: Commit generated files
        run: |
          if git diff --quiet -- docs/earnings.ics data/state.json data/resolved_events.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/earnings.ics data/state.json data/resolved_events.json
          git commit -m "Update earnings calendar"
          git push
